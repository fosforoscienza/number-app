<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Inserisci il numero di palline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
    }
    h1 { font-size: 1.6rem; color: #1a1a2e; margin-bottom: 8px; }
    p.subtitle { color: #666; font-size: 0.95rem; margin-bottom: 32px; }

    input[type="number"] {
      width: 100%;
      padding: 14px 16px;
      font-size: 1.4rem;
      border: 2px solid #d0d7ff;
      border-radius: 10px;
      outline: none;
      text-align: center;
      transition: border-color 0.2s;
    }
    input[type="number"]:focus { border-color: #4f6ef7; }
    input:disabled { background: #f5f5f5; color: #aaa; cursor: not-allowed; }

    button {
      margin-top: 16px;
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      background: #4f6ef7;
      color: #fff;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover:not(:disabled) { background: #3a57d6; }
    button:disabled { background: #a0aec0; cursor: not-allowed; }

    .feedback {
      margin-top: 20px;
      font-size: 1rem;
      min-height: 28px;
    }
    .feedback.success { color: #22c55e; font-weight: 600; }
    .feedback.error   { color: #ef4444; font-weight: 600; }
    .feedback.info    { color: #f59e0b; font-weight: 600; }
    .feedback.loading { color: #888; }

    .already-sent {
      margin-top: 24px;
      padding: 16px;
      background: #f0fdf4;
      border: 1px solid #bbf7d0;
      border-radius: 10px;
      color: #15803d;
      font-size: 0.95rem;
      display: none;
    }
    .already-sent.visible { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Quante palline ci sono?</h1>
    <p class="subtitle">Inserisci il numero di palline</p>
    <input type="number" id="numInput" placeholder="es. 42" autofocus min="0">
    <button id="submitBtn" onclick="submitNumber()">Invia</button>
    <div class="feedback" id="feedback"></div>
    <div class="already-sent" id="alreadySent">
      ✅ Hai già inviato il tuo numero.<br>Potrai inviarne un altro dopo il prossimo reset.
    </div>
  </div>

  <script>
    const input          = document.getElementById('numInput');
    const feedback       = document.getElementById('feedback');
    const btn            = document.getElementById('submitBtn');
    const alreadySentBox = document.getElementById('alreadySent');

    const LS_TOKEN_KEY = 'palline_browser_token';   // token univoco per browser
    const LS_STATE_KEY = 'palline_app_submitted';   // { resetToken }

    // ── Token univoco per browser ─────────────────────────────────────────────
    // Generato una sola volta e conservato in localStorage.
    // In questo modo ogni browser è identificato indipendentemente dall'IP.
    function getBrowserToken() {
      let token = localStorage.getItem(LS_TOKEN_KEY);
      if (!token) {
        token = crypto.randomUUID
          ? crypto.randomUUID()
          : Date.now().toString(36) + Math.random().toString(36).slice(2);
        localStorage.setItem(LS_TOKEN_KEY, token);
      }
      return token;
    }

    // ── Controlla stato all'avvio ─────────────────────────────────────────────
    async function checkSubmissionState() {
      try {
        const res  = await fetch('/api/data');
        const data = await res.json();
        const stored = JSON.parse(localStorage.getItem(LS_STATE_KEY) || 'null');
        // Se il resetToken coincide → questo browser ha già inviato in questo ciclo
        if (stored && stored.resetToken === data.resetToken) {
          lockForm();
        }
      } catch { /* server non raggiungibile: lascia il form attivo */ }
    }

    function lockForm() {
      input.disabled = true;
      btn.disabled   = true;
      alreadySentBox.classList.add('visible');
      feedback.textContent = '';
      feedback.className   = 'feedback';
    }

    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') submitNumber();
    });

    // ── Invio con retry automatico ────────────────────────────────────────────
    let isSubmitting = false;

    async function fetchWithRetry(url, options, maxRetries = 3) {
      for (let attempt = 1; attempt <= maxRetries; attempt++) {
        try {
          return await fetch(url, options);
        } catch {
          if (attempt === maxRetries) throw new Error('Connessione persa');
          showFeedback(`Tentativo ${attempt}/${maxRetries}…`, 'loading');
          await new Promise(r => setTimeout(r, 700 * attempt));
        }
      }
    }

    async function submitNumber() {
      if (isSubmitting) return;
      const value = input.value.trim();
      if (value === '' || isNaN(Number(value))) {
        showFeedback('Inserisci un numero valido', 'error');
        return;
      }

      isSubmitting    = true;
      btn.disabled    = true;
      btn.textContent = 'Invio…';

      try {
        const res  = await fetchWithRetry('/api/submit', {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ number: value, browserToken: getBrowserToken() })
        });
        const data = await res.json();

        if (res.ok) {
          localStorage.setItem(LS_STATE_KEY, JSON.stringify({ resetToken: data.resetToken }));
          showFeedback(`✅ Inviato! (totale risposte: ${data.count})`, 'success');
          input.value = '';
          setTimeout(lockForm, 1500);
        } else if (data.alreadySubmitted) {
          showFeedback('Hai già inviato il tuo numero', 'info');
          lockForm();
        } else {
          showFeedback(data.error || "Errore nell'invio", 'error');
          btn.disabled    = false;
          btn.textContent = 'Invia';
          isSubmitting    = false;
        }
      } catch {
        showFeedback('⚠️ Connessione persa. Riprova.', 'error');
        btn.disabled    = false;
        btn.textContent = 'Invia';
        isSubmitting    = false;
      } finally {
        if (!btn.disabled) btn.textContent = 'Invia';
      }
    }

    function showFeedback(msg, type) {
      feedback.textContent = msg;
      feedback.className   = 'feedback ' + type;
      clearTimeout(feedback._timer);
      if (type === 'error') {
        feedback._timer = setTimeout(() => {
          feedback.textContent = '';
          feedback.className   = 'feedback';
        }, 4000);
      }
    }

    checkSubmissionState();
  </script>
</body>
</html>
