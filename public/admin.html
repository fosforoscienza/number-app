<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pannello palline</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      padding: 32px 16px;
    }
    .container { max-width: 700px; margin: 0 auto; }
    h1 { font-size: 1.7rem; color: #1a1a2e; margin-bottom: 24px; }

    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .stat-card .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 6px;
    }
    .stat-card .value { font-size: 2rem; font-weight: 700; color: #1a1a2e; }
    .stat-card.avg .value { color: #4f6ef7; }

    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reset { background: #fee2e2; color: #ef4444; }
    .btn-reset:hover { background: #fca5a5; color: #b91c1c; }

    .live-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      font-size: 0.85rem;
      color: #888;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #22c55e;
      flex-shrink: 0;
      animation: pulse 1.5s infinite;
    }
    .status-dot.error { background: #ef4444; animation: none; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }

    .progress-bar {
      flex: 1;
      height: 4px;
      background: #e8eaff;
      border-radius: 4px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: #4f6ef7;
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .table-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      background: #f8f9ff;
      padding: 14px 20px;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #e8eaff;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background 0.15s; }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9ff; }
    tbody td { padding: 12px 20px; color: #1a1a2e; font-size: 0.95rem; }
    td:first-child { color: #999; font-size: 0.85rem; width: 80px; }
    td:last-child { font-weight: 600; font-size: 1.1rem; }
    .empty { text-align: center; padding: 48px; color: #aaa; font-size: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pannello Admin — Palline</h1>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Totale risposte</div>
        <div class="value" id="count">—</div>
      </div>
      <div class="stat-card avg">
        <div class="label">Media</div>
        <div class="value" id="average">—</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-reset" onclick="resetData()">🗑 Resetta dati</button>
    </div>

    <!-- Barra live con pallino e progress -->
    <div class="live-bar">
      <div class="status-dot" id="dot"></div>
      <span id="liveLabel">Aggiornamento automatico attivo</span>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <span id="lastUpdate">—</span>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr><th>#</th><th>Numero di palline inserito</th></tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="2" class="empty">Caricamento…</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const INTERVAL   = 3000;   // ms tra un aggiornamento e l'altro
    const dot        = document.getElementById('dot');
    const liveLabel  = document.getElementById('liveLabel');
    const lastUpdate = document.getElementById('lastUpdate');
    const fill       = document.getElementById('progressFill');

    // ── Barra di progresso animata ────────────────────────────────────────────
    let progressStart = null;
    function animateProgress(ts) {
      if (!progressStart) progressStart = ts;
      const elapsed = ts - progressStart;
      const pct     = Math.min((elapsed / INTERVAL) * 100, 100);
      fill.style.width = pct + '%';
      if (pct < 100) requestAnimationFrame(animateProgress);
    }
    function resetProgress() {
      progressStart = null;
      fill.style.width = '0%';
      requestAnimationFrame(animateProgress);
    }

    // ── Carica dati ───────────────────────────────────────────────────────────
    async function loadData() {
      try {
        const res  = await fetch('/api/data');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        const data = await res.json();

        document.getElementById('count').textContent = data.count;
        document.getElementById('average').textContent =
          data.average !== null ? Number(data.average.toFixed(4)).toString() : '—';

        const tbody = document.getElementById('tableBody');
        if (data.entries.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" class="empty">Nessun numero inserito</td></tr>';
        } else {
          tbody.innerHTML = [...data.entries].reverse().map(e =>
            `<tr><td>${e.id}</td><td>${e.value}</td></tr>`
          ).join('');
        }

        // Stato OK
        dot.classList.remove('error');
        liveLabel.textContent = 'Aggiornamento automatico attivo';
        const now = new Date();
        lastUpdate.textContent = now.toLocaleTimeString('it-IT');

      } catch (err) {
        dot.classList.add('error');
        liveLabel.textContent = '⚠️ Errore connessione';
        console.error('[admin] loadData:', err.message);
      }

      resetProgress();
    }

    // ── Reset ─────────────────────────────────────────────────────────────────
    async function resetData() {
      if (!confirm('Sei sicuro di voler cancellare tutti i dati? L\'operazione è irreversibile.')) return;
      try {
        await fetch('/api/reset', { method: 'DELETE' });
        loadData();
      } catch {
        alert('Errore durante il reset');
      }
    }

    // ── Avvio ─────────────────────────────────────────────────────────────────
    loadData();
    setInterval(loadData, INTERVAL);
  </script>
</body>
</html>
