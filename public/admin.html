<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Pannello numeri</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #f0f4ff;
      padding: 32px 16px;
    }
    .container {
      max-width: 700px;
      margin: 0 auto;
    }
    h1 {
      font-size: 1.7rem;
      color: #1a1a2e;
      margin-bottom: 24px;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      background: #fff;
      border-radius: 12px;
      padding: 20px 24px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    }
    .stat-card .label {
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #888;
      margin-bottom: 6px;
    }
    .stat-card .value {
      font-size: 2rem;
      font-weight: 700;
      color: #1a1a2e;
    }
    .stat-card.avg .value { color: #4f6ef7; }
    .actions {
      display: flex;
      gap: 12px;
      margin-bottom: 24px;
      align-items: center;
    }
    button {
      padding: 10px 20px;
      font-size: 0.9rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .btn-refresh {
      background: #4f6ef7;
      color: #fff;
    }
    .btn-refresh:hover { background: #3a57d6; }
    .btn-reset {
      background: #fee2e2;
      color: #ef4444;
    }
    .btn-reset:hover { background: #fca5a5; color: #b91c1c; }
    .auto-label {
      font-size: 0.85rem;
      color: #888;
      margin-left: auto;
    }
    .table-wrapper {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      overflow: hidden;
    }
    table {
      width: 100%;
      border-collapse: collapse;
    }
    thead th {
      background: #f8f9ff;
      padding: 14px 20px;
      text-align: left;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #666;
      border-bottom: 1px solid #e8eaff;
    }
    tbody tr {
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f8f9ff; }
    tbody td {
      padding: 12px 20px;
      color: #1a1a2e;
      font-size: 0.95rem;
    }
    td:first-child { color: #999; font-size: 0.85rem; width: 80px; }
    td:last-child { font-weight: 600; font-size: 1.1rem; }
    .empty {
      text-align: center;
      padding: 48px;
      color: #aaa;
      font-size: 1rem;
    }
    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #22c55e;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Pannello Admin</h1>

    <div class="stats">
      <div class="stat-card">
        <div class="label">Totale inserimenti</div>
        <div class="value" id="count">—</div>
      </div>
      <div class="stat-card avg">
        <div class="label">Media</div>
        <div class="value" id="average">—</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn-refresh" onclick="loadData()">Aggiorna</button>
      <button class="btn-reset" onclick="resetData()">Resetta dati</button>
      <span class="auto-label"><span class="status-dot"></span>Aggiornamento automatico ogni 5s</span>
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>#</th>
            <th>Numero inserito</th>
          </tr>
        </thead>
        <tbody id="tableBody">
          <tr><td colspan="2" class="empty">Caricamento...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    async function loadData() {
      try {
        const res = await fetch('/api/data');
        const data = await res.json();
        document.getElementById('count').textContent = data.count;
        document.getElementById('average').textContent =
          data.average !== null ? Number(data.average.toFixed(4)).toString() : '—';

        const tbody = document.getElementById('tableBody');
        if (data.entries.length === 0) {
          tbody.innerHTML = '<tr><td colspan="2" class="empty">Nessun numero inserito</td></tr>';
        } else {
          // Mostra dal più recente al più vecchio
          tbody.innerHTML = [...data.entries].reverse().map(e =>
            `<tr><td>${e.id}</td><td>${e.value}</td></tr>`
          ).join('');
        }
      } catch {
        document.getElementById('tableBody').innerHTML =
          '<tr><td colspan="2" class="empty">Errore nel caricamento</td></tr>';
      }
    }

    async function resetData() {
      if (!confirm('Sei sicuro di voler cancellare tutti i dati? L\'operazione è irreversibile.')) return;
      try {
        await fetch('/api/reset', { method: 'DELETE' });
        loadData();
      } catch {
        alert('Errore durante il reset');
      }
    }

    loadData();
    setInterval(loadData, 5000);
  </script>
</body>
</html>
